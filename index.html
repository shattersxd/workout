    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#0c0c0f;overflow-x:hidden}
    body{overscroll-behavior-y:contain}

    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    input[type=number]{-moz-appearance:textfield}
    #root{min-height:100vh}
    #loader{
      position:fixed;inset:0;background:#0c0c0f;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:9999;gap:16px;transition:opacity 0.5s;

    #loader .lbl{font-family:monospace;font-size:10px;letter-spacing:4px;color:#333}
    #loader .ring{width:48px;height:48px}
    #loader .err{

      text-align:center;max-width:300px;line-height:1.7;
      padding:16px;background:#1a0808;border:1px solid #3a1010;
      border-radius:10px;display:none;margin:0 16px;
    }
    #ios-hint{
      display:none;position:fixed;bottom:20px;left:16px;right:16px;
      background:#1a1a22;border:1px solid #2a2a35;border-radius:14px;
      padding:18px 16px 16px;z-index:1000;font-family:monospace;
    }
    #ios-hint.show{display:block}
    #ios-hint p{font-size:13px;color:#888;line-height:1.8}
    #ios-hint strong{color:#fff}
    #ios-hint .cls{
      position:absolute;top:10px;right:14px;background:none;
      border:none;color:#555;font-size:20px;cursor:pointer;padding:4px;
    }
  </style>

<script>
function showErr(msg) {
  var e = document.getElementById('err');
  e.textContent = msg;
  e.style.display = 'block';
  document.getElementById('lbl').textContent = 'ОШИБКА';
  document.getElementById('spin-arc').style.display = 'none';
}
function hideLoader() {
  var l = document.getElementById('loader');
  l.style.opacity = '0';
  setTimeout(function(){ l.style.display = 'none'; }, 500);
}
function setLabel(t) { document.getElementById('lbl').textContent = t; }

function loadScript(url, cb) {
  var s = document.createElement('script');
  s.src = url;
  s.onload = cb;
  s.onerror = function() { showErr('Не удалось загрузить: ' + url.split('/').pop() + '\nПроверь соединение'); };
  document.head.appendChild(s);
}

window.onerror = function(msg, src, line, col, err) {
  showErr('Ошибка JS:\n' + msg + '\n(строка ' + line + ')');
  return false;
};

setLabel('REACT...');

        var isSafari = /Safari/.test(navigator.userAgent) && !/CriOS|FxiOS/.test(navigator.userAgent);
        if (isIOS && isSafari && !window.navigator.standalone) {
          setTimeout(function(){ document.getElementById('ios-hint').classList.add('show'); }, 2000);
        }

        // Service worker for offline
        if ('serviceWorker' in navigator) {
          try {
            var sw = 'const C="sila-v5";' +
              'self.addEventListener("install",e=>{self.skipWaiting()});' +
              'self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))))});' +
              'self.addEventListener("fetch",e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));return res}).catch(()=>caches.match(e.request))))});';
            var blob = new Blob([sw], {type:'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
          } catch(e2) {}
        }
      } catch(e) {
        showErr('Ошибка компиляции:\n' + e.message);
        console.error(e);
      }
    });
  });
});
</script>

const STORAGE_KEY = "ppl_tracker_v4";
function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : { sessions: {}, history: {}, swaps: {}, skipped: {}, customWorkouts: {} }; }
  catch { return { sessions: {}, history: {}, swaps: {}, skipped: {}, customWorkouts: {} }; }
}
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }
function todayKey() { return new Date().toISOString().slice(0, 10); }

function App() {
  const [data, setData] = useState(loadData);
  const [activeDay, setActiveDay] = useState("push");
  const [activeTab, setActiveTab] = useState("workout");
  const [expandedEx, setExpandedEx] = useState(null);
  const [swapModal, setSwapModal] = useState(null);
  const [toast, setToast] = useState(null);
  const [editMode, setEditMode] = useState(false);
  // planScreen: null | "list" | "builder" | {editing: id}
  const [planScreen, setPlanScreen] = useState(null);
  const [builderName, setBuilderName] = useState("");
  const [builderColor, setBuilderColor] = useState("#4488ff");
  const [builderExercises, setBuilderExercises] = useState([]);
  const [builderSearch, setBuilderSearch] = useState("");
  // timer: { total, endsAt, left, running }
  // endsAt = wall-clock ms - survives iOS background freeze
  const [timer, setTimer] = useState(null);
  const [notifEnabled, setNotifEnabled] = useState(false);
  const timerRef = useRef(null);
  const notifTimerRef = useRef(null);
  const endsAtRef = useRef(null); // mirror of timer.endsAt for setInterval closure

  useEffect(() => { saveData(data); }, [data]);

  // Single tick useEffect - depends only on running flag
  // Uses endsAtRef instead of timer.endsAt to avoid stale closure
  useEffect(() => {
    clearInterval(timerRef.current);
    if (!timer || !timer.running) return;
    endsAtRef.current = timer.endsAt;
    timerRef.current = setInterval(function() {
      try {
        var left = Math.max(0, Math.round((endsAtRef.current - Date.now()) / 1000));
        if (left <= 0) {
          clearInterval(timerRef.current);
          try { if (navigator.vibrate) navigator.vibrate([150, 80, 150, 80, 300]); } catch(e) {}
          setTimer(function(t) { return t ? Object.assign({}, t, { left: 0, running: false }) : null; });
        } else {
          setTimer(function(t) { return t ? Object.assign({}, t, { left: left }) : null; });
        }
      } catch(e) {}
    }, 500);
    return function() { clearInterval(timerRef.current); };
  }, [timer ? timer.running : false]);

  // Keep endsAtRef in sync when addTime changes endsAt
  useEffect(function() {
    if (timer && timer.endsAt) endsAtRef.current = timer.endsAt;
  }, [timer ? timer.endsAt : null]);

  // Persist to localStorage so timer survives app kill/reopen
  useEffect(function() {
    try {
      if (timer && timer.running && timer.endsAt) {
        localStorage.setItem("sila_timer", JSON.stringify({ total: timer.total, endsAt: timer.endsAt }));
      } else {
        localStorage.removeItem("sila_timer");
      }
    } catch(e) {}
  }, [timer ? timer.running : false, timer ? timer.endsAt : null]);

  // Restore timer on mount if app was killed during rest
  useEffect(function() {
    try {
      var saved = localStorage.getItem("sila_timer");
      if (saved) {
        var t = JSON.parse(saved);
        var left = Math.round((t.endsAt - Date.now()) / 1000);
        if (left > 0) setTimer({ total: t.total, endsAt: t.endsAt, left: left, running: true });
        localStorage.removeItem("sila_timer");
      }
    } catch(e) {}
  }, []);

  // Resync timer when app returns from background
  useEffect(function() {
    function onVisible() {
      if (!document.hidden) {
        setTimer(function(t) {
          if (!t || !t.running || !t.endsAt) return t;
          var left = Math.max(0, Math.round((t.endsAt - Date.now()) / 1000));
          return Object.assign({}, t, { left: left, running: left > 0 });
        });
      }
    }
    document.addEventListener("visibilitychange", onVisible);
    return function() { document.removeEventListener("visibilitychange", onVisible); };
  }, []);

  // Request notification permission
  async function requestNotifPermission() {
    if (!("Notification" in window)) return;
    const result = await Notification.requestPermission();
    setNotifEnabled(result === "granted");
  }

  useEffect(function() {
    if (typeof Notification !== "undefined" && Notification.permission === "granted") setNotifEnabled(true);
  }, []);

  function parseRestSeconds(restStr) {
    if (!restStr) return 120;
    const minMatch = restStr.match(/(\d+)\s*мин/);
    const secMatch = restStr.match(/(\d+)\s*сек/);
    let s = 0;
    if (minMatch) s += parseInt(minMatch[1]) * 60;
    if (secMatch) s += parseInt(secMatch[1]);
    return s || 120;
  }

  function startTimer(restStr) {
    try {
      clearInterval(timerRef.current);
      clearTimeout(notifTimerRef.current);
      var secs = parseRestSeconds(restStr);
      var endsAt = Date.now() + secs * 1000;
      endsAtRef.current = endsAt;
      notifTimerRef.current = setTimeout(function() {
        try {
          if (typeof Notification !== "undefined" && Notification.permission === "granted") {
            new Notification("Отдых окончен!", { body: "Следующий подход!", silent: false });
          }
        } catch(e) {}
      }, secs * 1000);
      setTimer({ total: secs, endsAt: endsAt, left: secs, running: true });
    } catch(e) {}
  }

  function stopTimer() {
    try { clearInterval(timerRef.current); } catch(e) {}
    try { clearTimeout(notifTimerRef.current); } catch(e) {}
    try { localStorage.removeItem("sila_timer"); } catch(e) {}
    setTimer(null);
  }

  function addTime(s) {
    try {
      setTimer(function(t) {
        if (!t) return null;
        var newEndsAt = t.endsAt + s * 1000;
        var newLeft = Math.max(0, Math.round((newEndsAt - Date.now()) / 1000));
        endsAtRef.current = newEndsAt;
        clearTimeout(notifTimerRef.current);
        notifTimerRef.current = setTimeout(function() {
          try {
            if (typeof Notification !== "undefined" && Notification.permission === "granted") {
              new Notification("Отдых окончен!", { body: "Следующий подход!", silent: false });
            }
          } catch(e) {}
        }, newLeft * 1000);
        return Object.assign({}, t, { endsAt: newEndsAt, left: newLeft });
      });
    } catch(e) {}
  }

  const sessionKey = `${todayKey()}_${activeDay}`;
  const session = data.sessions[sessionKey] || {};

  // Resolve exercise - may be swapped
  function getExercise(originalId) {
    const swappedId = (data.swaps && data.swaps[activeDay] && data.swaps[activeDay][originalId]);
    if (swappedId) {
      const alt = (ALTERNATIVES[originalId] || []).find(a => a.id === swappedId);
      if (alt) return { ...alt, _originalId: originalId, _isSwapped: true };
    }
    const w0 = getWorkout(activeDay); const prog = w0 ? w0.exercises.find(e => e.id === originalId) : null;
    return { ...prog, _originalId: originalId, _isSwapped: false };
  }

  // skipped[day] = Set of originalIds that are hidden for today's session
  function isSkipped(exId) {
    const sk = data.skipped && data.skipped[activeDay];
    return sk ? sk.indexOf(exId) >= 0 : false;
  }
  function toggleSkip(exId) {
    setData(prev => {
      const sk = JSON.parse(JSON.stringify(prev.skipped || {}));
      if (!sk[activeDay]) sk[activeDay] = [];
      const idx = sk[activeDay].indexOf(exId);
      if (idx >= 0) sk[activeDay].splice(idx, 1);
      else sk[activeDay].push(exId);
      return { ...prev, skipped: sk };
    });
  }

  // --- CUSTOM WORKOUTS ----------------------------------------------------
  function getAllExercises() {
    // Flat list of all exercises from PROGRAM + ALTERNATIVES pool, deduplicated
    const seen = {};
    const list = [];
    Object.values(PROGRAM).forEach(day => {
      day.exercises.forEach(ex => {
        if (!seen[ex.id]) { seen[ex.id] = true; list.push({ ...ex, _group: day.name }); }
      });
    });
    Object.values(ALTERNATIVES).forEach(alts => {
      alts.forEach(ex => {
        if (!seen[ex.id]) { seen[ex.id] = true; list.push({ ...ex, _group: "АЛЬТЕРНАТИВЫ" }); }
      });
    });
    return list;
  }

  function saveCustomWorkout(id, workout) {
    setData(prev => {
      const cw = JSON.parse(JSON.stringify(prev.customWorkouts || {}));
      cw[id] = workout;
      return { ...prev, customWorkouts: cw };
    });
  }

  function deleteCustomWorkout(id) {
    if (activeDay === id) setActiveDay("push");
    setData(prev => {
      const cw = JSON.parse(JSON.stringify(prev.customWorkouts || {}));
      delete cw[id];
      return { ...prev, customWorkouts: cw };
    });
  }

  function getWorkout(dayKey) {
    // Returns workout object (like PROGRAM[key]) for both built-in and custom
    if (PROGRAM[dayKey]) return PROGRAM[dayKey];
    const cw = data.customWorkouts && data.customWorkouts[dayKey];
    if (cw) return cw;
    return null;
  }

  function startBuilder(existingId) {
    if (existingId) {
      const cw = data.customWorkouts[existingId];
      setBuilderName(cw.name);
      setBuilderColor(cw.color);
      setBuilderExercises(cw.exercises.map(e => ({ ...e })));
      setPlanScreen({ editing: existingId });
    } else {
      setBuilderName("");
      setBuilderColor("#4488ff");
      setBuilderExercises([]);
      setPlanScreen("builder");
    }
    setBuilderSearch("");
  }

  function saveBuilder(existingId) {
    if (!builderName.trim() || builderExercises.length === 0) return;
    const id = existingId || ("custom_" + Date.now());
    saveCustomWorkout(id, {
      label: "СВОЙ",
      name: builderName.trim().toUpperCase(),
      sub: builderExercises.slice(0,3).map(e => e.name).join(" | "),
      color: builderColor,
      exercises: builderExercises,
      isCustom: true,
    });
    setPlanScreen("list");
  }

  function toggleBuilderExercise(ex) {
    setBuilderExercises(prev => {
      const idx = prev.findIndex(e => e.id === ex.id);
      if (idx >= 0) return prev.filter((_, i) => i !== idx);
      return [...prev, { id: ex.id, name: ex.name, sets: ex.sets, reps: ex.reps, rest: ex.rest, steps: ex.steps, warn: ex.warn, danger: ex.danger }];
    });
  }

  function updateBuilderExSets(exId, field, val) {
    setBuilderExercises(prev => prev.map(e => e.id === exId ? { ...e, [field]: val } : e));
  }

  function moveBuilderEx(idx, dir) {
    setBuilderExercises(prev => {
      const arr = [...prev];
      const swap = idx + dir;
      if (swap < 0 || swap >= arr.length) return arr;
      [arr[idx], arr[swap]] = [arr[swap], arr[idx]];
      return arr;
    });
  }

  function allDayKeys() {
    const builtin = Object.keys(PROGRAM);
    const custom = Object.keys(data.customWorkouts || {});
    return [...builtin, ...custom];
  }

  function getPlanColor(key) {
    const w = getWorkout(key);
    return w ? w.color : "#444";
  }

  function getPlanName(key) {
    const w = getWorkout(key);
    return w ? w.name : key;
  }

  function swapExercise(originalId, newId) {
    setData(prev => {
      const swaps = JSON.parse(JSON.stringify(prev.swaps || {}));
      if (!swaps[activeDay]) swaps[activeDay] = {};
      if (newId === originalId) { delete swaps[activeDay][originalId]; }
      else { swaps[activeDay][originalId] = newId; }
      return { ...prev, swaps };
    });
    setSwapModal(null);
    showToast("Упражнение заменено");
  }

  function getSetData(exId, setIdx) {
    return (session[exId] && session[exId][setIdx]) || { weight: "", done: false };
  }
  function updateSet(exId, setIdx, field, value) {
    setData(prev => {
      const s = JSON.parse(JSON.stringify(prev.sessions));
      if (!s[sessionKey]) s[sessionKey] = {};
      if (!s[sessionKey][exId]) s[sessionKey][exId] = {};
      if (!s[sessionKey][exId][setIdx]) s[sessionKey][exId][setIdx] = { weight: "", done: false };
      s[sessionKey][exId][setIdx][field] = value;
      return { ...prev, sessions: s };
    });
  }
  function toggleDone(exId, setIdx, restStr) {
    const cur = getSetData(exId, setIdx);
    const newDone = !cur.done;
    updateSet(exId, setIdx, "done", newDone);
    if (newDone) startTimer(restStr);
    else stopTimer();
  }
  function getExProgress(exId, totalSets) {
    const done = Array.from({ length: totalSets }, (_, i) => getSetData(exId, i).done).filter(Boolean).length;
    return { done, total: totalSets };
  }
  function getDayProgress() {
    const workout = getWorkout(activeDay) || PROGRAM.push;
    let done = 0, total = 0, exDone = 0;
    workout.exercises.forEach(ex => {
      if (isSkipped(ex.id)) return;
      const resolved = getExercise(ex.id); // already resolves swap to replacement exercise
      let allSetsDone = true;
      for (let i = 0; i < resolved.sets; i++) {
        total++;
        if (getSetData(resolved.id, i).done) { done++; } else { allSetsDone = false; }
      }
      if (allSetsDone && resolved.sets > 0) exDone++;
    });
    return { done, total, pct: total ? Math.round(done / total * 100) : 0, exDone };
  }
  function finishWorkout() {
    const prog = getDayProgress();
    if (prog.exDone < 3) {
      showToast("Выполни хотя бы 3 упражнения");
      return;
    }
    const entry = { date: todayKey(), workout: activeDay, name: (getWorkout(activeDay) || {}).name || activeDay, done: prog.done, total: prog.total, ts: Date.now() };
    setData(prev => {
      const history = JSON.parse(JSON.stringify(prev.history || {}));
      if (!history[activeDay]) history[activeDay] = [];
      history[activeDay] = [entry, ...history[activeDay]].slice(0, 30);
      return { ...prev, history };
    });
    showToast("Тренировка сохранена!");
  }
  function showToast(msg) { setToast(msg); setTimeout(() => setToast(null), 2500); }
  function getLastWeight(exId) {
    const dayHistory = Object.keys(data.sessions).filter(k => k.includes(`_${activeDay}`) && k !== sessionKey).sort().reverse();
    for (const k of dayHistory) {
      const ex = (data.sessions[k] && data.sessions[k][exId]);
      if (ex) { const ws = Object.values(ex).map(s => s.weight).filter(Boolean); if (ws.length) return ws[0]; }
    }
    return null;
  }

  // Get last N sessions weights for an exercise: [{date, sets: [weights]}]
  function getExHistory(exId, n = 4) {
    const keys = Object.keys(data.sessions)
      .filter(k => k.includes("_" + activeDay) && k !== sessionKey)
      .sort().reverse().slice(0, n);
    return keys.map(k => {
      const dateStr = k.split("_")[0];
      const ex = data.sessions[k] && data.sessions[k][exId];
      const weights = ex ? Object.values(ex).map(s => parseFloat(s.weight) || 0) : [];
      const maxW = weights.length ? Math.max(...weights) : null;
      const avgW = weights.length ? Math.round(weights.reduce((a,b)=>a+b,0) / weights.length * 10) / 10 : null;
      return { date: dateStr, weights, maxW, avgW };
    }).filter(r => r.maxW !== null).reverse(); // oldest first for chart
  }

  const prog = getDayProgress();
  const w = getWorkout(activeDay) || PROGRAM.push;
  const hasAlts = (id) => (ALTERNATIVES[id] || []).length > 0;

  return (
    <div style={{ minHeight: "100vh", background: "#0c0c0f", color: "#e8e8e8", fontFamily: "'DM Mono','Fira Mono',monospace", paddingBottom: timer ? 160 : 80 }}>

      {/* HEADER */}
      <div style={{ background: "#0c0c0f", borderBottom: "1px solid #1a1a22", padding: "20px 20px 0" }}>
        <div style={{ maxWidth: 560, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
            <div>
              <div style={{ fontSize: 10, letterSpacing: 4, color: "#444", marginBottom: 4 }}>PUSH / PULL / LEGS</div>
              <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: 1, color: "#fff" }}>WORKOUT ROUTINE</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 10, color: "#444", marginBottom: 2 }}>сегодня</div>
                <div style={{ fontSize: 13, color: "#666" }}>{new Date().toLocaleDateString("ru", { day: "numeric", month: "short" })}</div>
              </div>
              <button onClick={() => setPlanScreen("list")}
                style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, padding: "6px 10px", borderRadius: 8, border: "1px solid #2a2a2a", background: "#0f0f12", cursor: "pointer", fontFamily: "inherit", flexShrink: 0 }}>
                <span style={{ fontSize: 14, color: "#666", lineHeight: 1 }}>+</span>
                <span style={{ fontSize: 7, color: "#444", letterSpacing: 0.5 }}>ПЛАН</span>
              </button>
            </div>
          </div>
          <div style={{ display: "flex", gap: 4, marginBottom: 16 }}>
            {WEEK_SCHEDULE.map(({ day, workout }) => {
              const todayDow = ["ВС","ПН","ВТ","СР","ЧТ","ПТ","СБ"][new Date().getDay()];
              const isToday = day === todayDow;
              const wColor = workout ? PROGRAM[workout].color : "#2a2a2a";
              return (
                <div key={day} onClick={() => workout && setActiveDay(workout)}
                  style={{ flex: 1, textAlign: "center", cursor: workout ? "pointer" : "default", padding: "7px 2px 8px", borderRadius: 6, background: isToday ? `${wColor}15` : "transparent", border: isToday ? `1px solid ${wColor}50` : "1px solid transparent" }}>
                  <div style={{ fontSize: 9, color: isToday ? "#ccc" : "#2a2a2a", letterSpacing: 1, marginBottom: 5, fontWeight: isToday ? 700 : 400 }}>{day}</div>
                  <div style={{ width: workout ? 8 : 5, height: workout ? 8 : 5, borderRadius: "50%", background: workout ? wColor : "#1a1a22", margin: "0 auto", boxShadow: isToday && workout ? `0 0 6px ${wColor}` : "none" }} />
                </div>
              );
            })}
          </div>
          <div style={{ display: "flex", borderBottom: "1px solid #1a1a22" }}>
            {[["workout","ТРЕН-КА"],["warmup","РАЗМИНКА"],["progress","ПРОГРЕСС"],["history","ИСТОРИЯ"],["principles","ПРИНЦИПЫ"]].map(([id, label]) => (
              <button key={id} onClick={() => setActiveTab(id)}
                style={{ flex: 1, padding: "11px 1px 13px", background: "none", border: "none", borderBottom: activeTab === id ? `3px solid ${w.color}` : "3px solid transparent", color: activeTab === id ? "#fff" : "#383838", fontSize: 7.5, letterSpacing: 0.8, cursor: "pointer", marginBottom: -1, transition: "all 0.15s", fontFamily: "inherit", fontWeight: activeTab === id ? 700 : 400, whiteSpace: "nowrap" }}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 560, margin: "0 auto", padding: "0 20px" }}>

        {/* ===== WORKOUT ===== */}
        {activeTab === "workout" && (
          <>
            <div style={{ overflowX: "auto", paddingBottom: 4 }}>
              <div style={{ display: "flex", gap: 8, padding: "20px 0 16px", minWidth: "max-content" }}>
                {allDayKeys().map(key => {
                  const day = getWorkout(key);
                  if (!day) return null;
                  const isActive = activeDay === key;
                  return (
                    <button key={key} onClick={() => { setActiveDay(key); setExpandedEx(null); }}
                      style={{ minWidth: 80, padding: "12px 8px", borderRadius: 8, border: "1px solid", borderColor: isActive ? day.color : "#1a1a22", background: isActive ? `${day.color}18` : "#0f0f12", cursor: "pointer", transition: "all 0.2s", fontFamily: "inherit", position: "relative" }}>
                      {day.isCustom && <div style={{ position: "absolute", top: 4, right: 4, width: 5, height: 5, borderRadius: "50%", background: day.color }} />}
                      <div style={{ fontSize: 8, color: isActive ? day.color : "#2a2a2a", letterSpacing: 2, marginBottom: 3 }}>{day.label}</div>
                      <div style={{ fontSize: 12, color: isActive ? "#fff" : "#444", fontWeight: 700, marginBottom: isActive ? 3 : 0 }}>{day.name}</div>
                      {isActive && <div style={{ fontSize: 8, color: day.color, opacity: 0.7, letterSpacing: 0 }}>{(day.sub || "").split("|")[0].trim()}</div>}
                    </button>
                  );
                })}

              </div>
            </div>

            <div style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <div style={{ fontSize: 11, color: "#444" }}>{w.sub}</div>
                <div style={{ fontSize: 11, color: w.color }}>{prog.done}/{prog.total} подходов</div>
              </div>
              <div style={{ height: 5, background: "#1a1a22", borderRadius: 3, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${prog.pct}%`, background: w.color, borderRadius: 3, transition: "width 0.5s", boxShadow: prog.pct > 0 ? `0 0 8px ${w.color}60` : "none" }} />
              </div>
            </div>

            {/* Edit mode toggle */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
              <div style={{ fontSize: 10, color: "#3a3a3a", letterSpacing: 1 }}>
                {w.exercises.filter(e => !isSkipped(e.id)).length} / {w.exercises.length} упражнений
              </div>
              <button onClick={() => setEditMode(!editMode)}
                style={{ padding: "8px 14px", borderRadius: 8, border: `1px solid ${editMode ? w.color : "#2a2a2a"}`, background: editMode ? `${w.color}20` : "#0c0c0f", color: editMode ? w.color : "#555", fontSize: 10, letterSpacing: 1, cursor: "pointer", fontFamily: "inherit", minHeight: 36 }}>
                {editMode ? "OK" : "ИЗМЕНИТЬ СПИСОК"}
              </button>
            </div>

            {w.exercises.map((baseEx, exIdx) => {
              const skipped = isSkipped(baseEx.id);
              const ex = getExercise(baseEx.id);
              const exProg = getExProgress(ex.id, ex.sets);
              const isExpanded = expandedEx === baseEx.id;
              const lastW = getLastWeight(ex.id);
              const exHist = getExHistory(ex.id, 4);
              const allDone = exProg.done === ex.sets;
              const canSwap = hasAlts(baseEx.id);

              // In edit mode show skipped cards dimmed with toggle
              if (skipped && !editMode) return null;

              return (
                <div key={baseEx.id} style={{ background: skipped ? "#0a0a0c" : "#0f0f12", border: `1px solid ${skipped ? "#161616" : allDone ? w.color + "60" : "#1a1a22"}`, borderLeft: !skipped && ex.warn ? `3px solid #ff4d4d50` : `1px solid ${skipped ? "#161616" : allDone ? w.color + "60" : "#1a1a22"}`, borderRadius: 10, marginBottom: 8, overflow: "hidden", opacity: skipped ? 0.45 : 1, transition: "all 0.2s" }}>

                  {/* Header row */}
                  <div style={{ padding: "14px 16px 10px", display: "flex", alignItems: "center", gap: 12 }}>
                    {/* Edit mode: skip toggle button instead of number */}
                    {editMode ? (
                      <button onClick={() => toggleSkip(baseEx.id)}
                        style={{ width: 28, height: 28, borderRadius: 7, border: `1px solid ${skipped ? "#333" : w.color + "80"}`, background: skipped ? "#111" : `${w.color}25`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, cursor: "pointer", fontSize: 13 }}>
                        {skipped ? "+" : "x"}
                      </button>
                    ) : (
                      <div onClick={() => setExpandedEx(isExpanded ? null : baseEx.id)} style={{ width: 28, height: 28, borderRadius: 7, background: allDone ? w.color : "#1a1a22", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "background 0.3s", cursor: "pointer" }}>
                        <span style={{ fontSize: 11, color: allDone ? "#000" : "#444", fontWeight: 700 }}>{exIdx + 1}</span>
                      </div>
                    )}
                    <div onClick={() => !editMode && setExpandedEx(isExpanded ? null : baseEx.id)} style={{ flex: 1, minWidth: 0, cursor: editMode ? "default" : "pointer" }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: skipped ? "#333" : "#ddd", marginBottom: 2, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                        {ex.name}
                        {!skipped && ex.warn && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: 3, background: "#ff4d4d18", color: "#ff6b6b", letterSpacing: 1 }}>!</span>}
                        {!skipped && ex._isSwapped && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: 3, background: `${w.color}20`, color: w.color, letterSpacing: 1 }}>ЗАМЕНА</span>}
                        {skipped && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: 3, background: "#1a1a22", color: "#333", letterSpacing: 1 }}>ПРОПУЩЕНО</span>}
                      </div>
                      <div style={{ fontSize: 10, color: "#2a2a2a" }}>
                        {ex.sets} x {ex.reps}  |  {ex.rest}
                        {!skipped && lastW && <span>  |  <span style={{ color: "#555" }}>{lastW} кг</span></span>}
                      </div>
                      {!skipped && !editMode && exHist.length > 0 && (
                        <div style={{ display: "flex", gap: 4, alignItems: "flex-end", height: 28 }}>

                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
                  <button onClick={() => setPlanScreen("list")} style={{ background: "none", border: "none", color: "#666", fontSize: 20, cursor: "pointer", padding: "4px 8px 4px 0" }}>{"<"}</button>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>{editingId ? "РЕДАКТИРОВАТЬ" : "НОВАЯ ТРЕНИРОВКА"}</div>
                </div>

                {/* Name + color */}
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 9, letterSpacing: 2, color: "#444", marginBottom: 6 }}>НАЗВАНИЕ</div>
                  <input value={builderName} onChange={e => setBuilderName(e.target.value)}
                    placeholder="например: ФУНКЦИОНАЛ"
                    style={{ width: "100%", background: "#0f0f12", border: "1px solid #2a2a2a", borderRadius: 8, padding: "10px 12px", color: "#fff", fontSize: 13, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
                </div>
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 9, letterSpacing: 2, color: "#444", marginBottom: 8 }}>ЦВЕТ</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    {COLORS.map(c => (
                      <div key={c} onClick={() => setBuilderColor(c)}
                        style={{ width: 28, height: 28, borderRadius: "50%", background: c, cursor: "pointer", border: builderColor === c ? "3px solid #fff" : "3px solid transparent", boxSizing: "border-box" }} />
                    ))}
                  </div>
                </div>

                {/* Selected exercises */}
                {builderExercises.length > 0 && (
                  <div style={{ marginBottom: 20 }}>
                    <div style={{ fontSize: 9, letterSpacing: 2, color: "#444", marginBottom: 8 }}>ВЫБРАННЫЕ ({builderExercises.length})</div>
                    {builderExercises.map((ex, idx) => (
                      <div key={ex.id} style={{ display: "flex", alignItems: "center", gap: 8, background: "#0f0f12", border: `1px solid ${builderColor}40`, borderRadius: 8, padding: "8px 12px", marginBottom: 6 }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 11, color: "#ddd", fontWeight: 600 }}>{ex.name}</div>
                          <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                            <input type="number" value={ex.sets} onChange={e => updateBuilderExSets(ex.id, "sets", parseInt(e.target.value) || 1)}
                              style={{ width: 36, background: "#1a1a22", border: "none", borderRadius: 4, padding: "2px 6px", color: "#aaa", fontSize: 11, fontFamily: "inherit" }} />
                            <span style={{ fontSize: 10, color: "#444" }}>x</span>
                            <input value={ex.reps} onChange={e => updateBuilderExSets(ex.id, "reps", e.target.value)}
                              style={{ width: 52, background: "#1a1a22", border: "none", borderRadius: 4, padding: "2px 6px", color: "#aaa", fontSize: 11, fontFamily: "inherit" }} />
                            <span style={{ fontSize: 10, color: "#444" }}>отд:</span>
                            <input value={ex.rest} onChange={e => updateBuilderExSets(ex.id, "rest", e.target.value)}
                              style={{ width: 60, background: "#1a1a22", border: "none", borderRadius: 4, padding: "2px 6px", color: "#aaa", fontSize: 11, fontFamily: "inherit" }} />
                          </div>
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                          <button onClick={() => moveBuilderEx(idx, -1)} style={{ background: "none", border: "1px solid #222", borderRadius: 4, color: "#444", cursor: "pointer", fontSize: 10, padding: "2px 6px", fontFamily: "inherit" }}>^</button>
                          <button onClick={() => moveBuilderEx(idx, 1)} style={{ background: "none", border: "1px solid #222", borderRadius: 4, color: "#444", cursor: "pointer", fontSize: 10, padding: "2px 6px", fontFamily: "inherit" }}>v</button>
                        </div>
                        <button onClick={() => toggleBuilderExercise(ex)} style={{ background: "none", border: "none", color: "#ff4d4d", cursor: "pointer", fontSize: 16, padding: "0 4px", fontFamily: "inherit" }}>x</button>
                      </div>
                    ))}
                  </div>
                )}

                {/* Save button */}
                <button onClick={() => saveBuilder(editingId)}
                  disabled={!builderName.trim() || builderExercises.length === 0}
                  style={{ width: "100%", padding: 14, background: builderName.trim() && builderExercises.length > 0 ? builderColor : "#1a1a22", border: "none", borderRadius: 10, color: builderName.trim() && builderExercises.length > 0 ? "#000" : "#333", fontSize: 11, fontWeight: 700, letterSpacing: 3, cursor: "pointer", marginBottom: 20, fontFamily: "inherit" }}>
                  {editingId ? "СОХРАНИТЬ ИЗМЕНЕНИЯ" : "СОЗДАТЬ ТРЕНИРОВКУ"}
                </button>

                {/* Search + exercise pool */}
                <div style={{ fontSize: 9, letterSpacing: 2, color: "#444", marginBottom: 8 }}>ДОБАВИТЬ УПРАЖНЕНИЯ</div>
                <input value={builderSearch} onChange={e => setBuilderSearch(e.target.value)}
                  placeholder="Поиск..."
                  style={{ width: "100%", background: "#0f0f12", border: "1px solid #2a2a2a", borderRadius: 8, padding: "8px 12px", color: "#fff", fontSize: 12, fontFamily: "inherit", outline: "none", marginBottom: 12, boxSizing: "border-box" }} />

                {Object.entries(groups).map(([group, exList]) => (
                  <div key={group} style={{ marginBottom: 16 }}>
                    <div style={{ fontSize: 9, letterSpacing: 2, color: "#333", marginBottom: 6 }}>{group}</div>
                    {exList.map(ex => {
                      const selected = builderExercises.some(e => e.id === ex.id);
                      return (
                        <div key={ex.id} onClick={() => toggleBuilderExercise(ex)}
                          style={{ display: "flex", alignItems: "center", gap: 10, background: selected ? `${builderColor}12` : "#0f0f12", border: `1px solid ${selected ? builderColor + "60" : "#1a1a22"}`, borderRadius: 8, padding: "10px 12px", marginBottom: 5, cursor: "pointer" }}>
                          <div style={{ width: 16, height: 16, borderRadius: 4, border: `1px solid ${selected ? builderColor : "#333"}`, background: selected ? builderColor : "none", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                            {selected && <span style={{ fontSize: 10, color: "#000", fontWeight: 700 }}>v</span>}
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 11, color: selected ? "#fff" : "#888" }}>{ex.name}</div>
                            <div style={{ fontSize: 9, color: "#333" }}>{ex.sets} x {ex.reps} | {ex.rest}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            </div>
          );
        }

        // List screen: choose template or create custom
        return (
          <div style={{ position: "fixed", inset: 0, background: "#0c0c0f", zIndex: 100, overflowY: "auto", paddingBottom: 40 }}>
            <div style={{ maxWidth: 560, margin: "0 auto", padding: "20px 20px 0" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
                <button onClick={() => setPlanScreen(null)} style={{ background: "none", border: "none", color: "#666", fontSize: 20, cursor: "pointer", padding: "4px 8px 4px 0" }}>{"<"}</button>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>МОЙ ПЛАН</div>
              </div>

              {/* Built-in templates */}
              <div style={{ fontSize: 9, letterSpacing: 2, color: "#444", marginBottom: 10 }}>БАЗОВЫЕ ПРОГРАММЫ</div>
              {Object.entries(PROGRAM).map(([key, day]) => (
                <div key={key} style={{ background: "#0f0f12", border: `1px solid #1a1a22`, borderLeft: `3px solid ${day.color}`, borderRadius: 10, padding: "14px 16px", marginBottom: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", marginBottom: 3 }}>{day.name}</div>
                      <div style={{ fontSize: 10, color: "#444" }}>{day.sub}</div>
                      <div style={{ fontSize: 9, color: "#333", marginTop: 4 }}>{day.exercises.length} упражнений</div>
                    </div>
                    <button onClick={() => { setActiveDay(key); setPlanScreen(null); setActiveTab("workout"); }}
                      style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${day.color}60`, background: `${day.color}15`, color: day.color, fontSize: 9, letterSpacing: 1, cursor: "pointer", fontFamily: "inherit" }}>
                      ОТКРЫТЬ
                    </button>
                  </div>
                </div>
              ))}

              {/* Custom workouts */}
              {Object.keys(data.customWorkouts || {}).length > 0 && (
                <>
                  <div style={{ fontSize: 9, letterSpacing: 2, color: "#444", marginTop: 20, marginBottom: 10 }}>МОИ ТРЕНИРОВКИ</div>
                  {Object.entries(data.customWorkouts).map(([id, cw]) => (
                    <div key={id} style={{ background: "#0f0f12", border: "1px solid #1a1a22", borderLeft: `3px solid ${cw.color}`, borderRadius: 10, padding: "14px 16px", marginBottom: 8 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", marginBottom: 3 }}>{cw.name}</div>
                          <div style={{ fontSize: 9, color: "#333" }}>{cw.exercises.length} упражнений</div>
                        </div>
                        <button onClick={() => { setActiveDay(id); setPlanScreen(null); setActiveTab("workout"); }}
                          style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${cw.color}60`, background: `${cw.color}15`, color: cw.color, fontSize: 9, cursor: "pointer", fontFamily: "inherit" }}>ОТКРЫТЬ</button>
                        <button onClick={() => startBuilder(id)}
                          style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #2a2a2a", background: "none", color: "#555", fontSize: 9, cursor: "pointer", fontFamily: "inherit" }}>ИЗМЕНИТЬ</button>
                        <button onClick={() => deleteCustomWorkout(id)}
                          style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #3a1a1a", background: "none", color: "#883333", fontSize: 9, cursor: "pointer", fontFamily: "inherit" }}>УДАЛИТЬ</button>
                      </div>
                    </div>
                  ))}
                </>
              )}

              {/* Create new */}
              <div style={{ marginTop: 24 }}>
                <div style={{ fontSize: 9, letterSpacing: 2, color: "#444", marginBottom: 10 }}>СОЗДАТЬ СВОЮ</div>
                <button onClick={() => startBuilder(null)}
                  style={{ width: "100%", padding: 16, background: "none", border: "1px dashed #2a2a2a", borderRadius: 10, color: "#555", fontSize: 11, letterSpacing: 2, cursor: "pointer", fontFamily: "inherit" }}>
                  + НОВАЯ ТРЕНИРОВКА
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {swapModal && (() => {
        const baseEx = ((getWorkout(activeDay) || PROGRAM.push).exercises || []).find(e => e.id === swapModal);
        const currentSwap = (data.swaps && data.swaps[activeDay] && data.swaps[activeDay][swapModal]);
        const alts = ALTERNATIVES[swapModal] || [];
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center" }}
            onClick={() => setSwapModal(null)}>
            <div onClick={e => e.stopPropagation()}
              style={{ background: "#111", borderRadius: "16px 16px 0 0", padding: "24px 20px 40px", width: "100%", maxWidth: 560, maxHeight: "80vh", overflowY: "auto" }}>
              <div style={{ fontSize: 9, letterSpacing: 3, color: "#444", marginBottom: 6 }}>ВЫБЕРИ УПРАЖНЕНИЕ</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#fff", marginBottom: 20 }}>{baseEx.name}</div>

              {/* Оригинал */}
              <div onClick={() => swapExercise(swapModal, swapModal)}
                style={{ padding: "14px 16px", borderRadius: 10, border: `1px solid ${!currentSwap ? w.color : "#2a2a2a"}`, background: !currentSwap ? `${w.color}15` : "#0c0c0f", marginBottom: 8, cursor: "pointer" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: !currentSwap ? w.color : "#333", flexShrink: 0 }} />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, color: !currentSwap ? "#fff" : "#888", fontWeight: 600, marginBottom: 2 }}>{baseEx.name}</div>
                    <div style={{ fontSize: 10, color: "#3a3a3a" }}>{baseEx.sets} x {baseEx.reps}  |  оригинал</div>
                  </div>
                  {!currentSwap && <div style={{ fontSize: 10, color: w.color }}>+</div>}
                </div>
              </div>

              {/* Альтернативы */}
              <div style={{ fontSize: 9, letterSpacing: 2, color: "#444", margin: "16px 0 8px" }}>АЛЬТЕРНАТИВЫ</div>
              {alts.map(alt => {
                const isActive = currentSwap === alt.id;
                return (
                  <div key={alt.id} onClick={() => swapExercise(swapModal, alt.id)}
                    style={{ padding: "14px 16px", borderRadius: 10, border: `1px solid ${isActive ? w.color : "#1a1a22"}`, background: isActive ? `${w.color}15` : "#0c0c0f", marginBottom: 8, cursor: "pointer" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ width: 8, height: 8, borderRadius: "50%", background: isActive ? w.color : "#2a2a2a", flexShrink: 0 }} />
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, color: isActive ? "#fff" : "#bbb", fontWeight: 600, marginBottom: 2 }}>{alt.name}</div>
                        <div style={{ fontSize: 10, color: "#3a3a3a" }}>{alt.sets} x {alt.reps}  |  {alt.rest}</div>
                        {alt.steps[0] && <div style={{ fontSize: 11, color: "#555", marginTop: 4 }}>{alt.steps[0]}</div>}
                      </div>
                      {isActive && <div style={{ fontSize: 10, color: w.color }}>+</div>}
                    </div>
                  </div>
                );
              })}

              <button onClick={() => setSwapModal(null)}
                style={{ width: "100%", padding: 14, background: "#1a1a22", border: "1px solid #2a2a2a", borderRadius: 10, color: "#666", fontSize: 12, cursor: "pointer", marginTop: 8, fontFamily: "inherit" }}>
                ЗАКРЫТЬ
              </button>
            </div>
          </div>
        );
      })()}

      {/* ===== TIMER ===== */}
      {timer && (() => {
        const pct = timer.total > 0 ? (timer.left / timer.total) * 100 : 0;
        const mins = Math.floor(timer.left / 60);
        const secs = timer.left % 60;
        const done = timer.left === 0;
        const circumference = 2 * Math.PI * 26;
        return (
          <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", zIndex: 500, display: "flex", alignItems: "center", gap: 14,
            background: done ? "#0f1a0f" : "#111118", border: `1px solid ${done ? "#00d4aa50" : "#2a2a35"}`,
            borderRadius: 20, padding: "12px 20px 12px 14px", boxShadow: "0 8px 32px rgba(0,0,0,0.6)",
            minWidth: 260, transition: "border-color 0.3s" }}>
            {/* Ring */}
            <div style={{ position: "relative", width: 56, height: 56, flexShrink: 0 }}>
              <svg width="56" height="56" style={{ transform: "rotate(-90deg)" }}>
                <circle cx="28" cy="28" r="26" fill="none" stroke="#1a1a22" strokeWidth="3" />
                <circle cx="28" cy="28" r="26" fill="none"
                  stroke={done ? "#00d4aa" : w.color}
                  strokeWidth="3"
                  strokeDasharray={circumference}
                  strokeDashoffset={circumference * (1 - pct / 100)}
                  strokeLinecap="round"
                  style={{ transition: "stroke-dashoffset 0.9s linear, stroke 0.3s" }} />
              </svg>
              <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                {done
                  ? <span style={{ fontSize: 20 }}>💪</span>
                  : <span style={{ fontSize: 13, fontWeight: 700, color: "#fff", fontFamily: "monospace" }}>
                      {mins > 0 ? `${mins}:${String(secs).padStart(2,"0")}` : secs}
                    </span>}
              </div>
            </div>
            {/* Text */}
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: done ? "#00d4aa" : "#888", marginBottom: 3, letterSpacing: 1 }}>
                {done ? "ОТДЫХ ОКОНЧЕН" : "ОТДЫХ"}
              </div>
              {!done && (
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                  <button onClick={() => addTime(30)} style={{ padding: "3px 8px", borderRadius: 5, border: "1px solid #2a2a35", background: "#1a1a22", color: "#888", fontSize: 10, cursor: "pointer", fontFamily: "inherit" }}>+30с</button>
                  <button onClick={() => addTime(60)} style={{ padding: "3px 8px", borderRadius: 5, border: "1px solid #2a2a35", background: "#1a1a22", color: "#888", fontSize: 10, cursor: "pointer", fontFamily: "inherit" }}>+1мин</button>
                  {"Notification" in window && Notification.permission !== "denied" && (
                    notifEnabled
                      ? <span title="Уведомления включены" style={{ fontSize: 12, opacity: 0.5 }}>🔔</span>
                      : <button onClick={requestNotifPermission} title="Включить уведомления" style={{ padding: "3px 8px", borderRadius: 5, border: "1px solid #33334a", background: "#1a1a2e", color: "#7788dd", fontSize: 10, cursor: "pointer", fontFamily: "inherit" }}>🔔 уведомить</button>
                  )}
                </div>
              )}
            </div>
            {/* Skip */}
            <button onClick={stopTimer}
              style={{ background: done ? "#00d4aa" : "#1a1a22", border: `1px solid ${done ? "#00d4aa" : "#2a2a35"}`, borderRadius: 10,
                padding: done ? "6px 14px" : "6px 10px", color: done ? "#000" : "#555",
                fontSize: done ? 11 : 10, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                letterSpacing: done ? 1 : 0, whiteSpace: "nowrap" }}>
              {done ? "ГОТОВ" : "x"}
            </button>
          </div>
        );
      })()}

      {toast && (
        <div style={{ position: "fixed", bottom: timer ? 110 : 30, left: "50%", transform: "translateX(-50%)", background: "#1a1a22", border: "1px solid #2a2a2a", borderRadius: 8, padding: "10px 20px", fontSize: 11, color: "#ccc", letterSpacing: 1, zIndex: 999, pointerEvents: "none" }}>
          {toast}
        </div>
      )}

      <style>{`
        * { box-sizing: border-box; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
        input[type=number] { -moz-appearance: textfield; }
      `}</style>
    </div>
  );
}


class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(e) { return { err: e }; }
  componentDidCatch(e, info) {
    try { showErr("React crash: " + e.message + "\n" + (info && info.componentStack ? info.componentStack.slice(0, 400) : "")); } catch(x) {}
  }
  render() {
    if (this.state.err) {
      return React.createElement("div", { style: { padding: "20px", color: "#ff6b6b", fontFamily: "monospace", fontSize: "13px", whiteSpace: "pre-wrap", background: "#0c0c0f", minHeight: "100vh" } },
        "\u274c React Error:\n\n" + this.state.err.message + "\n\n" + (this.state.err.stack || "").slice(0, 600)
      );
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);

</script>

</body>
</html>
